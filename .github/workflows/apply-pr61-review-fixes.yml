name: Apply PR 61 review fixes

on:
  push:
    branches:
      - fix/android-webview-runtime

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[pr61-review-fixes-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/android-webview-runtime
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/apply_pr61_review_fixes.py
      - name: Commit fixes and remove migration files
        shell: bash
        run: |
          set -euo pipefail
          rm -f tools/apply_pr61_review_fixes.py .github/workflows/apply-pr61-review-fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf(android): apply WebView review fixes [pr61-review-fixes-applied]"
          git push origin HEAD:fix/android-webview-runtime
