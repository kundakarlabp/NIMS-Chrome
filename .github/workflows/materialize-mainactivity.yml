name: Materialize MainActivity

on:
  push:
    branches: [runtime-direct-v082]

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: runtime-direct-v082
          fetch-depth: 0
      - name: Generate committed Kotlin source
        run: |
          python3 scripts/fix_materializer_raw_string.py
          python3 scripts/apply_android_0_8_1_patch.py
      - name: Commit generated Kotlin source
        run: |
          if git diff --quiet -- mobile/android/app/src/main/java/org/kundakarlab/nimsfastsummarymobile/MainActivity.kt; then exit 0; fi
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add mobile/android/app/src/main/java/org/kundakarlab/nimsfastsummarymobile/MainActivity.kt
          git commit -m "Materialize direct Android runtime source"
          git push origin HEAD:runtime-direct-v082
