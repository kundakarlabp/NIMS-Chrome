name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r helper/requirements-dev.txt
      - run: python -m pytest -q
      - run: python -m py_compile helper/main.py helper/models.py helper/cache.py

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: ./gradlew clean test lintDebug assembleDebug
        working-directory: mobile/android
      - run: unzip -l app/build/outputs/apk/debug/app-debug.apk | grep nimsReportCore.js
        working-directory: mobile/android
      - name: Run instrumented PDF tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          working-directory: mobile/android
          script: ./gradlew connectedDebugAndroidTest
      - uses: actions/upload-artifact@v4
        with:
          name: nims-fast-summary-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-test-lint-and-instrumentation-reports
          path: |
            mobile/android/app/build/reports/tests/
            mobile/android/app/build/reports/androidTests/
            mobile/android/app/build/outputs/androidTest-results/
            mobile/android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f helper/Dockerfile .
