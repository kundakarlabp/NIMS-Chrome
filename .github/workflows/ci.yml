name: CI

on:
  push:
  pull_request:

jobs:
  helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r helper/requirements-dev.txt
      - run: pytest -q
      - run: python -m py_compile helper/main.py helper/models.py helper/cache.py

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: ./gradlew test
        working-directory: mobile/android
      - run: ./gradlew assembleDebug
        working-directory: mobile/android

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f helper/Dockerfile .
