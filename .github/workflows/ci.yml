name: CI

on:
  push:
  pull_request:

jobs:
  helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r helper/requirements-dev.txt
      - run: python -m pytest -q
      - run: python -m py_compile helper/main.py helper/models.py helper/cache.py

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: ./gradlew clean
        working-directory: mobile/android
      - run: ./gradlew test
        working-directory: mobile/android
      - run: ./gradlew assembleDebug
        working-directory: mobile/android
      - uses: actions/upload-artifact@v4
        with:
          name: nims-fast-summary-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30
      - run: unzip -l app/build/outputs/apk/debug/app-debug.apk | grep nimsReportCore.js
        working-directory: mobile/android
      - run: ./gradlew lintDebug
        working-directory: mobile/android
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-test-and-lint-reports
          path: |
            mobile/android/app/build/reports/tests/
            mobile/android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f helper/Dockerfile .
