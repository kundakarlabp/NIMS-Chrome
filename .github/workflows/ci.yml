name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  helper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r helper/requirements-dev.txt
      - run: python -m pytest -q
      - run: python -m py_compile helper/main.py helper/models.py helper/cache.py

  navigation-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Run navigation tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee npm-test.log
      - name: Upload navigation test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: navigation-test-log
          path: npm-test.log
          if-no-files-found: error
          retention-days: 7
      - name: Verify canonical navigation core sync
        run: python scripts/sync_navigation_core.py --check

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - run: python ../../scripts/sync_navigation_core.py --check
        working-directory: mobile/android
      - run: ./gradlew clean test lintDebug assembleDebug
        working-directory: mobile/android
      - name: Verify APK runtime assets
        working-directory: mobile/android
        run: |
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep nimsReportCore.js
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep nimsWebviewShim.js
          unzip -l app/build/outputs/apk/debug/app-debug.apk | grep jquery-3.7.1.min.js
      - name: Verify KVM
        run: |
          ls -l /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm
      - name: Run instrumented PDF tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          working-directory: mobile/android
          script: |
            adb wait-for-device
            ./gradlew connectedDebugAndroidTest --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: nims-fast-summary-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: android-test-lint-and-instrumentation-reports
          path: |
            mobile/android/app/build/reports/tests/
            mobile/android/app/build/reports/androidTests/
            mobile/android/app/build/outputs/androidTest-results/
            mobile/android/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f helper/Dockerfile .
