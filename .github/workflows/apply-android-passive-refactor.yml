name: Apply Android passive refactor

on:
  push:
    branches:
      - refactor/android-passive-portal

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, '[passive-refactor-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/android-passive-portal
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/apply_android_passive_refactor.py
      - name: Commit migration output
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No migration changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/android/app/src/main/java/org/kundakarlab/nimsfastsummarymobile/MainActivity.kt README.md
          git commit -m "refactor(android): simplify portal workflow [passive-refactor-applied]"
          git push origin HEAD:refactor/android-passive-portal
