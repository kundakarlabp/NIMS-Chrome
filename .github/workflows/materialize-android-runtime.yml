name: Materialize Android runtime source

on:
  push:
    branches:
      - fix/android-runtime-direct-0.8.2

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize MainActivity source
        run: python scripts/materialize_android_runtime_0_8_2.py
      - name: Commit generated source once
        run: |
          if git diff --quiet -- mobile/android/app/src/main/java/org/kundakarlab/nimsfastsummarymobile/MainActivity.kt; then
            echo "MainActivity already materialized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add mobile/android/app/src/main/java/org/kundakarlab/nimsfastsummarymobile/MainActivity.kt
          git commit -m "Materialize direct Android document-start runtime"
          git push origin HEAD:${{ github.ref_name }}
