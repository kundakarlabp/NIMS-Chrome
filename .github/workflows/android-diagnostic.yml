name: Android diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Compile
        working-directory: mobile/android
        run: ./gradlew compileDebugKotlin testDebugUnitTest --console=plain -q
