name: Android diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Capture compiler output
        working-directory: mobile/android
        continue-on-error: true
        run: ./gradlew compileDebugKotlin testDebugUnitTest --console=plain > android-compile.log 2>&1
      - name: Upload compiler output
        uses: actions/upload-artifact@v4
        with:
          name: android-compile-diagnostic
          path: mobile/android/android-compile.log
          if-no-files-found: error
          retention-days: 3
