<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NIMS Fast Summary</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="nims-sidepanel">
    <main class="panel-shell">
      <div class="panel-header">
        <h1>NIMS Fast Summary</h1>
      </div>
      <div class="safety-warning">Clinical safety: verify values against source reports before clinical decisions.</div>
      <div class="mode-actions primary-actions">
        <button id="diagnosePage">Diagnose Page</button>
        <button id="discoverMapping">Discover Mapping</button>
        <button id="testDirectFetch">Test Direct Fetch</button>
        <button id="runFast">Bulk Fast Summary</button>
        <button id="runCultures">Bulk Cultures Only</button>
        <button id="runFull">Bulk Full Summary</button>
        <button id="clearMapping">Clear Mapping</button>
        <button id="manualPopupFallback">Manual Popup Fallback</button>
        <button id="copyMappingDiagnostics">Copy Safe Mapping Diagnostics</button>
        <button id="copyDirectFetchDiagnostics">Copy Direct Fetch Diagnostics</button>
      </div>
      <div class="mode-actions">
        <button id="copySummary">Copy summary</button>
        <button id="exportCsv">Export CSV</button>
        <button id="exportJson">Export JSON</button>
        <button id="clearCache">Clear cache</button>
        <button id="retryFailed">Retry failed reports</button>
      </div>
      <section class="helper-settings">
        <h2>Helper Settings</h2>
        <label>
          Helper mode
          <select id="helperMode">
            <option value="local">Local: http://127.0.0.1:8765</option>
            <option value="remote">Remote Railway</option>
          </select>
        </label>
        <label>
          Helper URL
          <input id="helperUrl" type="url" placeholder="https://your-service.up.railway.app">
        </label>
        <label>
          Helper API key
          <input id="helperApiKey" type="password" autocomplete="off" placeholder="Required for remote mode">
        </label>
        <div id="helperKeyStatus" class="empty"></div>
        <div class="mode-actions">
          <button id="saveHelperSettings">Save settings</button>
          <button id="testHelperConnection">Test Helper Connection</button>
          <button id="clearHelperSettings">Clear helper settings</button>
        </div>
      </section>
      <div id="status" class="status">Waiting for report list.</div>
      <section>
        <h2>Page Diagnosis</h2>
        <div id="diagnostics" class="empty">No diagnosis yet.</div>
      </section>
      <section>
        <h2>Summary</h2>
        <div id="summaryHeader" class="empty">No summary yet.</div>
      </section>
      <section>
        <h2>Source Reports</h2>
        <div id="sourceReports"></div>
      </section>
      <section>
        <h2>Failed Reports</h2>
        <div id="failedReports"></div>
      </section>
      <section>
        <h2>Lab Trends</h2>
        <div id="labTrends"></div>
      </section>
      <section>
        <h2>Cultures</h2>
        <div id="cultures"></div>
      </section>
      <section>
        <h2>Interpretation</h2>
        <ul id="interpretation"></ul>
      </section>
    </main>
    <script src="sidepanelUtils.js"></script>
    <script src="sidepanel.js"></script>
  </body>
</html>
